##[>] 🤖🤖
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - plan
  - apply

variables:
  CI_IMAGE: registry.gitlab.com/konradodwrot/infra/ci-images/ci-linux:bookworm
  TF_IN_AUTOMATION: "true"
  GITLAB_TOKEN: $TF_GITLAB_TOKEN
  TF_VAR_github_token: $GITHUB_TOKEN
  GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

default:
  image: $CI_IMAGE
  before_script:
    - printf '%s' "$GOOGLE_CREDENTIALS" | base64 -d > "$GOOGLE_APPLICATION_CREDENTIALS"
    - test -s "$GOOGLE_APPLICATION_CREDENTIALS" || { echo "decoded SA key is empty — check GOOGLE_CREDENTIALS var"; exit 1; }
    - unset GOOGLE_CREDENTIALS

validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make validate

validate-pre-commit-all:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    CHE_DRY_RUN_RENDER_SECRETS: "true"
  before_script: []
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

plan:
  stage: plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make plan
  artifacts:
    paths:
      - tf/plan.tfplan
    expire_in: 7 days

apply:
  stage: apply
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - make plan
    - make apply
##[<] 🤖🤖
