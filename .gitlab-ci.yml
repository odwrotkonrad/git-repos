##[>] 🤖🤖
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  GITLAB_TOKEN: $TF_GITLAB_TOKEN
  TF_VAR_github_token: $GITHUB_TOKEN
  GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

default:
  image:
    name: hashicorp/terraform:1.15.7
    entrypoint: [""]
  before_script:
    - apk add --no-cache make zsh
    - printf '%s' "$GOOGLE_CREDENTIALS" | base64 -d > "$GOOGLE_APPLICATION_CREDENTIALS"
    - test -s "$GOOGLE_APPLICATION_CREDENTIALS" || { echo "decoded SA key is empty — check GOOGLE_CREDENTIALS var"; exit 1; }
    - unset GOOGLE_CREDENTIALS

validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make validate

validate-pre-commit-all:
  stage: validate
  image: golang:1.26-bookworm
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    CHE_DRY_RUN_RENDER_SECRETS: "true"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make zsh
    - go install gitlab.com/konradodwrot/go/che@latest
    - go install github.com/evilmartians/lefthook@latest
    - mkdir -p ~/.config/lefthook
    - '[ -f ~/.config/lefthook/lefthook.yml ] || printf "min_version: 2.1.9\n" > ~/.config/lefthook/lefthook.yml'
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

plan:
  stage: plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make plan
  artifacts:
    paths:
      - tf/plan.tfplan
    expire_in: 7 days

apply:
  stage: apply
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - make plan
    - make apply
##[<] 🤖🤖
