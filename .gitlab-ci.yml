##[>] 🤖🤖
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  GITLAB_TOKEN: $TF_GITLAB_TOKEN
  TF_VAR_github_token: $GITHUB_TOKEN
  GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

default:
  image:
    name: hashicorp/terraform:1.15.7
    entrypoint: [""]
  before_script:
    - apk add --no-cache make zsh
    - printf '%s' "$GOOGLE_CREDENTIALS" | base64 -d > "$GOOGLE_APPLICATION_CREDENTIALS"
    - test -s "$GOOGLE_APPLICATION_CREDENTIALS" || { echo "decoded SA key is empty — check GOOGLE_CREDENTIALS var"; exit 1; }
    - unset GOOGLE_CREDENTIALS

validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make validate

plan:
  stage: plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make plan
  artifacts:
    paths:
      - tf/plan.tfplan
    expire_in: 7 days

apply:
  stage: apply
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - make plan
    - make apply
##[<] 🤖🤖
